symbol: BTC
dry_run: false

# Timing
interval_secs: 60

# Spread / quoting
spread_bps: 4
order_size_pct: 0.02       # 2% of equity per order level
order_levels: 2
level_spacing_bps: 5
ob_depth: 5
ob_imbalance_factor: 1.0       # shift spread based on bid/ask depth imbalance
funding_rate_factor: 1.0       # bias skew toward FR-favorable side

# Inventory management
max_inventory_pct: 0.05    # 5% of equity as max unhedged inventory
skew_factor: 5.0
inventory_hard_limit_mult: 2.0
force_close_mult: 1.5          # market-order close when inv > hard_limit * 1.5
force_close_cooldown_secs: 120 # min seconds between force-close actions

# Volatility-adaptive spread
volatility_window: 60
volatility_spread_mult: 0.5
min_spread_bps: 2
max_spread_bps: 50

# Adverse selection protection
trend_window: 10               # mid samples for trend detection (10 × 30s = 5min)
trend_threshold_bps: 3.0       # pause quoting on trend side if exceeded
post_fill_spread_mult: 2.0     # spread multiplier right after fill (decays)
post_fill_decay_secs: 30       # seconds for post-fill boost to decay
inventory_spread_mult: 1.0     # spread widens proportional to |inventory|

# Hedge (sub-account)
hedge_enabled: false
hedge_threshold_ratio: 0.2
hedge_close_threshold_ratio: 0.1

# Risk
max_leverage: 20
equity_usd_fallback: 500
stale_order_secs: 300
