symbol: BTC
dry_run: false

# Timing
interval_secs: 60

# Spread / quoting
spread_bps: 4
order_size_pct: 0.02       # 2% of equity per order level
order_levels: 3
level_spacing_bps: 5
ob_depth: 5

# Inventory management
max_inventory_pct: 0.10    # 10% of equity as max unhedged inventory
skew_factor: 0.5
inventory_hard_limit_mult: 2.0

# Volatility-adaptive spread
volatility_window: 60
volatility_spread_mult: 0.5
min_spread_bps: 2
max_spread_bps: 50

# Hedge (sub-account)
hedge_enabled: true
hedge_threshold_ratio: 0.6
hedge_close_threshold_ratio: 0.3

# Risk
max_leverage: 20
equity_usd_fallback: 500
stale_order_secs: 300
