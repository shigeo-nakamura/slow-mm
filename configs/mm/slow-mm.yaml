symbol: LIT
dry_run: false
strategy_mode: passive_mm
price_decimals: 4              # LIT: $1.1050 (0.0001 tick)
size_decimals: 2               # LIT: 209.42 (0.01 step)

# Spot hedge: hedge perp inventory on spot to stay delta-neutral
spot_hedge_symbol: "LIT/USDC"

# Timing
interval_secs: 30             # 30s cycle — LIT spread is wide, no need to requote often

# Spread / quoting
spread_bps: 25                # Must exceed spot taker cost (~10bps) per side: 25/2=12.5bps > 10bps
order_size_pct: 0.02          # 2% of equity per order level
order_levels: 2               # 2 levels each side for better fill probability
level_spacing_bps: 10         # 2nd level 10bps deeper
ob_depth: 5
ob_imbalance_factor: 1.0      # shift spread based on bid/ask depth imbalance
funding_rate_factor: 1.0      # bias skew toward FR-favorable side

# Inventory management
max_inventory_pct: 0.05       # 5% of equity as max unhedged inventory
skew_factor: 5.0              # strong skew to discourage adding to position
inventory_hard_limit_mult: 0.4    # ~1 order fill = hard limit, stop same-side quotes
force_close_mult: 1.5
force_close_cooldown_secs: 120

# Volatility-adaptive spread
volatility_window: 60
volatility_spread_mult: 1.0
min_spread_bps: 5
max_spread_bps: 50

# Adverse selection protection
trend_window: 10
trend_threshold_bps: 15.0
ema_short_periods: 5
ema_long_periods: 20
trend_strength_threshold: 40.0
aggressive_unwind_bps: 2.0
post_fill_spread_mult: 1.3
post_fill_decay_secs: 15
inventory_spread_mult: 0.5

# Hedge (sub-account) — disabled, using spot hedge instead
hedge_enabled: false
hedge_threshold_ratio: 0.2
hedge_close_threshold_ratio: 0.1

# Risk
max_leverage: 20
equity_usd_fallback: 500
stale_order_secs: 300
