symbol: LIT
dry_run: false
strategy_mode: mean_reversion
price_decimals: 4              # LIT: $1.1050 (0.0001 tick)
size_decimals: 2               # LIT: 209.42 (0.01 step)

# Spot hedge: empty = disabled (no hedge for MR scalping)
spot_hedge_symbol: ""

# Timing
interval_secs: 20             # 20s EMA update cycle

# Position sizing
order_size_pct: 0.10          # 10% of equity per trade

# EMA parameters
ema_short_periods: 5
ema_long_periods: 20

# Mean-reversion parameters (optimized via 30-day backtest)
# Backtest: +$165/30d, 79% win rate, maxDD $2.71, 1.41 trades/10min
tf_entry_threshold_bps: 15.0  # Enter (fade) when EMA divergence > 15bps
stop_loss_bps: 30.0           # Hard stop-loss at -30bps
tf_take_profit_bps: 5.0       # Take profit at +5bps (quick scalp)
mr_revert_bps: 5.0            # Close when EMA converges within 5bps
tf_cooldown_secs: 60          # 60s cooldown after close

# Trend pause: 0 = disabled. Set to e.g. 80 to pause during strong trends.
mr_trend_pause_bps: 0

# Passive MM settings (unused, kept for fallback)
spread_bps: 25
order_levels: 1
ob_depth: 5
max_inventory_pct: 0.05
skew_factor: 5.0
inventory_hard_limit_mult: 0.4
volatility_window: 60
min_spread_bps: 5
max_spread_bps: 50

# Hedge (sub-account) — disabled
hedge_enabled: false

# Risk
max_leverage: 20
equity_usd_fallback: 500
stale_order_secs: 300
