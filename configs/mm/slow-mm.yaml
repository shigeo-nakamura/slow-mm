symbol: LIT
dry_run: false
strategy_mode: passive_mm

# Timing
interval_secs: 30             # 30s cycle — LIT moves fast, need frequent requotes

# Spread / quoting
spread_bps: 15                # LIT native spread 5-30bps; 15bps base = ~7.5bps each side
order_size_pct: 0.02          # 2% of equity per order level
order_levels: 2               # 2 levels each side for better fill probability
level_spacing_bps: 10         # 2nd level 10bps deeper
ob_depth: 5
ob_imbalance_factor: 1.0      # shift spread based on bid/ask depth imbalance
funding_rate_factor: 1.0      # bias skew toward FR-favorable side

# Inventory management
max_inventory_pct: 0.05       # 5% of equity as max unhedged inventory
skew_factor: 5.0              # strong skew to reduce inventory quickly
inventory_hard_limit_mult: 2.0
force_close_mult: 1.5         # market-order close when inv > hard_limit * 1.5
force_close_cooldown_secs: 120

# Volatility-adaptive spread
volatility_window: 60
volatility_spread_mult: 1.0   # widen spread more aggressively with vol (was 0.5)
min_spread_bps: 5             # never go below 5bps (LIT has thin book)
max_spread_bps: 80            # allow wider spread in volatile periods

# Adverse selection protection
trend_window: 10
trend_threshold_bps: 3.0
ema_short_periods: 5
ema_long_periods: 20
trend_strength_threshold: 10.0  # raised from 5 — LIT is noisier, avoid over-pausing
aggressive_unwind_bps: 2.0      # unwind at entry ± 2bps (tighter than spread)
post_fill_spread_mult: 2.0      # widen spread after fill to avoid adverse selection
post_fill_decay_secs: 30
inventory_spread_mult: 1.5      # widen spread more when holding inventory (was 1.0)

# Hedge (sub-account)
hedge_enabled: false
hedge_threshold_ratio: 0.2
hedge_close_threshold_ratio: 0.1

# Risk
max_leverage: 20
equity_usd_fallback: 500
stale_order_secs: 300
