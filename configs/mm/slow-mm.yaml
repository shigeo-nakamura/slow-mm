symbol: LIT
dry_run: false
strategy_mode: mean_reversion
price_decimals: 4              # LIT: $1.1050 (0.0001 tick)
size_decimals: 2               # LIT: 209.42 (0.01 step)

# Spot hedge: empty = disabled (no hedge for MR scalping)
spot_hedge_symbol: ""

# Timing
interval_secs: 5              # 5s cycle for tighter stop-loss execution

# Position sizing
order_size_pct: 0.10          # 10% of equity per trade

# EMA parameters
ema_short_periods: 5
ema_long_periods: 20

# Mean-reversion parameters (optimized via 30-day backtest with 8bps residual spread)
# Backtest: PnL=$768/30d, 43% win, maxDD ~$38, 0.51 trades/10min (auto-updated 2026-03-13)
tf_entry_threshold_bps: 20.0  # Enter (fade) when EMA divergence > 20bps
stop_loss_bps: 80.0           # Wide stop-loss at -80bps (avoid noise stops)
tf_take_profit_bps: 15.0      # Take profit at +15bps (> spread cost)
mr_revert_bps: 3.0            # Close when EMA converges within 3bps
tf_cooldown_secs: 60          # 60s cooldown after close

# Trend pause: 0 = disabled. Set to e.g. 80 to pause during strong trends.
mr_trend_pause_bps: 0

# Passive MM settings (unused, kept for fallback)
spread_bps: 25
order_levels: 1
ob_depth: 5
max_inventory_pct: 0.05
skew_factor: 5.0
inventory_hard_limit_mult: 0.4
volatility_window: 60
min_spread_bps: 5
max_spread_bps: 50

# Hedge (sub-account) — disabled
hedge_enabled: false

# Risk
max_leverage: 20
equity_usd_fallback: 500
stale_order_secs: 300
