symbol: LIT
dry_run: false
strategy_mode: trend_follow
price_decimals: 4              # LIT: $1.1050 (0.0001 tick)
size_decimals: 2               # LIT: 209.42 (0.01 step)

# Spot hedge: hedge perp inventory on spot to stay delta-neutral
spot_hedge_symbol: "LIT/USDC"

# Timing
interval_secs: 30             # 30s EMA update cycle

# Position sizing
order_size_pct: 0.05          # 5% of equity per trend trade

# EMA trend detection (reused from passive_mm)
ema_short_periods: 5
ema_long_periods: 20

# Trend-follow parameters
tf_entry_threshold_bps: 20.0  # Enter when |EMA_short - EMA_long| > 20bps
stop_loss_bps: 30.0           # Hard stop-loss at -30bps from entry
tf_take_profit_bps: 50.0      # Take profit at +50bps from entry
tf_trail_stop_bps: 20.0       # Trailing stop: 20bps below peak
tf_cooldown_secs: 60           # 60s cooldown after stop-loss

# Passive MM settings (unused in trend_follow, kept for fallback)
spread_bps: 25
order_levels: 1
ob_depth: 5
max_inventory_pct: 0.05
skew_factor: 5.0
inventory_hard_limit_mult: 0.4
volatility_window: 60
min_spread_bps: 5
max_spread_bps: 50

# Hedge (sub-account) — disabled, using spot hedge instead
hedge_enabled: false

# Risk
max_leverage: 20
equity_usd_fallback: 500
stale_order_secs: 300
