symbol: HYPE
dry_run: false
strategy_mode: mean_reversion
price_decimals: 2              # HYPE: $33.89 (0.01 tick)
size_decimals: 2               # HYPE: 0.50 min_order (0.01 step)

# Spot hedge: empty = disabled (no hedge for MR scalping)
spot_hedge_symbol: ""

# Timing
interval_secs: 5              # 5s cycle for tighter stop-loss execution

# Position sizing
order_size_pct: 0.10          # 10% of equity per trade

# EMA parameters
ema_short_periods: 4
ema_long_periods: 20

# Mean-reversion parameters (optimized via 30-day backtest WITH spread cost)
# HYPE spread: median 4.7bps (half=2.4bps/side). Entry/TP/revert auto-scale with regime.
# Backtest @4bp: PnL=$1592/30d, 76% win, maxDD $14.24, e=20 s=80 t=15 r=10
tf_entry_threshold_bps: 20.0  # Base entry (range); trend scales up
stop_loss_bps: 80.0           # Wide stop-loss
tf_take_profit_bps: 15.0      # Base TP (range); trend scales up
mr_revert_bps: 10.0           # Base revert (range); trend scales up
tf_cooldown_secs: 60          # 60s cooldown after close

# Regime scaling: scale entry/tp/revert by macro trend strength
regime_mid_bps: 10.0          # Baseline for scaling (scale=macro/this)
regime_max_scale: 2.5         # Cap on scale factor

# Trend pause: skip MR entry when macro EMA divergence exceeds this threshold.
# Prevents counter-trend entries during strong directional moves.
mr_trend_pause_bps: 0

# Passive MM settings (unused, kept for fallback)
spread_bps: 25
order_levels: 1
ob_depth: 5
max_inventory_pct: 0.05
skew_factor: 5.0
inventory_hard_limit_mult: 0.4
volatility_window: 60
min_spread_bps: 5
max_spread_bps: 50

# Hedge (sub-account) — disabled
hedge_enabled: false

# Risk
max_leverage: 20
equity_usd_fallback: 500
stale_order_secs: 300
