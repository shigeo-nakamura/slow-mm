symbol: LIT
dry_run: false
strategy_mode: mean_reversion
price_decimals: 4              # LIT: $1.1050 (0.0001 tick)
size_decimals: 2               # LIT: 209.42 (0.01 step)

# Spot hedge: empty = disabled (no hedge for MR scalping)
spot_hedge_symbol: ""

# Timing
interval_secs: 5              # 5s cycle for tighter stop-loss execution

# Position sizing
order_size_pct: 0.10          # 10% of equity per trade

# EMA parameters
ema_short_periods: 4
ema_long_periods: 20

# Mean-reversion parameters (optimized via 30-day backtest WITH spread cost + regime_scale)
# Spread: median 15.4bps (half=7.7bps/side). Entry/TP/revert auto-scale with regime.
# Backtest: PnL=$598/30d, 73.4% win, maxDD $2.11, 0.37 trades/10min (auto-updated 2026-03-15)
tf_entry_threshold_bps: 25.0  # Base entry (range); trend scales up to 62.5bps
stop_loss_bps: 50.0           # Wide stop-loss (avoid noise stops)
tf_take_profit_bps: 5.0       # Base TP (range); trend scales up to 12.5bps
mr_revert_bps: 10.0           # Base revert (range); trend scales up to 25bps
tf_cooldown_secs: 60          # 60s cooldown after close

# Regime scaling: scale entry/tp/revert by macro trend strength
regime_mid_bps: 10.0          # Baseline for scaling (scale=macro/this)
regime_max_scale: 2.5         # Cap on scale factor

# Trend pause: skip MR entry when macro EMA divergence exceeds this threshold.
# Prevents counter-trend entries during strong directional moves.
mr_trend_pause_bps: 0

# Passive MM settings (unused, kept for fallback)
spread_bps: 25
order_levels: 1
ob_depth: 5
max_inventory_pct: 0.05
skew_factor: 5.0
inventory_hard_limit_mult: 0.4
volatility_window: 60
min_spread_bps: 5
max_spread_bps: 50

# Hedge (sub-account) — disabled
hedge_enabled: false

# Risk
max_leverage: 20
equity_usd_fallback: 500
stale_order_secs: 300
