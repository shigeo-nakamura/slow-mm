name: Rust CI

on:
  push:
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - ".github/workflows/ci.yml"
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:
    inputs:
      dex_connector_ref:
        description: "Dex-connector ref/tag (optional)"
        required: false
        type: string

concurrency:
  group: slow-mm-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  INSTALL_DIR: /opt/slow-mm
  DEX_CONNECTOR_REF: v4.2.4
  LIGHTER_GO_REF: v1.0.2
  AL2023_IMAGE: public.ecr.aws/amazonlinux/amazonlinux:2023

jobs:
  resolve-ref:
    runs-on: ubuntu-latest
    outputs:
      dex_connector_ref: ${{ steps.resolve.outputs.dex_connector_ref }}
      should_deploy: ${{ steps.resolve.outputs.should_deploy }}
    steps:
      - name: Resolve dex-connector ref
        id: resolve
        env:
          DEFAULT_REF: ${{ env.DEX_CONNECTOR_REF }}
          INPUT_REF: ${{ github.event.inputs.dex_connector_ref }}
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request

          default_ref = os.environ.get("DEFAULT_REF", "").strip()
          input_ref = (os.environ.get("INPUT_REF") or "").strip()
          event = os.environ.get("EVENT_NAME", "")
          token = os.environ.get("GH_TOKEN", "")

          ref = input_ref or default_ref
          if not input_ref:
              try:
                  req = urllib.request.Request(
                      "https://api.github.com/repos/shigeo-nakamura/dex-connector/tags?per_page=1",
                      headers={
                          "Accept": "application/vnd.github+json",
                          "Authorization": f"Bearer {token}",
                      },
                  )
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      data = json.load(resp)
                  if data and "name" in data[0]:
                      ref = data[0]["name"]
              except Exception:
                  pass

          should = "true"
          if event == "schedule" and ref == default_ref and not input_ref:
              should = "false"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"dex_connector_ref={ref}\n")
              f.write(f"should_deploy={should}\n")
          PY

  build-test:
    needs: resolve-ref
    if: needs.resolve-ref.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    env:
      DEX_CONNECTOR_REF: ${{ needs.resolve-ref.outputs.dex_connector_ref }}
      LIGHTER_GO_PATH: ${{ github.workspace }}/lighter-go
      LD_LIBRARY_PATH: ${{ github.workspace }}/lighter-go
    defaults:
      run:
        working-directory: slow-mm
    steps:
      - name: Checkout slow-mm
        uses: actions/checkout@v4
        with:
          path: slow-mm

      - name: Checkout dex-connector
        uses: actions/checkout@v4
        with:
          repository: shigeo-nakamura/dex-connector
          ref: ${{ env.DEX_CONNECTOR_REF }}
          path: dex-connector
          token: ${{ secrets.DEX_CONNECTOR_PAT || github.token }}

      - name: Checkout lighter-go
        uses: actions/checkout@v4
        with:
          repository: elliottech/lighter-go
          ref: ${{ env.LIGHTER_GO_REF }}
          path: lighter-go

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21.x"
          cache: true
          cache-dependency-path: lighter-go/go.sum

      - name: Build libsigner
        run: go build -buildmode=c-shared -trimpath -o libsigner.so ./sharedlib
        working-directory: ${{ github.workspace }}/lighter-go

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            slow-mm -> target

      - name: Cargo check
        run: cargo check --all-targets --locked

      - name: Cargo test
        run: cargo test --all-targets --locked

  deploy:
    runs-on: ubuntu-latest
    needs: [resolve-ref, build-test]
    if: needs.resolve-ref.outputs.should_deploy == 'true' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    environment: slow-mm
    env:
      DEX_CONNECTOR_REF: ${{ needs.resolve-ref.outputs.dex_connector_ref }}
    steps:
      - name: Checkout slow-mm
        uses: actions/checkout@v4
        with:
          path: slow-mm

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Checkout dex-connector
        uses: actions/checkout@v4
        with:
          repository: shigeo-nakamura/dex-connector
          ref: ${{ env.DEX_CONNECTOR_REF }}
          path: dex-connector
          token: ${{ secrets.DEX_CONNECTOR_PAT || github.token }}

      - name: Checkout lighter-go
        uses: actions/checkout@v4
        with:
          repository: elliottech/lighter-go
          ref: ${{ env.LIGHTER_GO_REF }}
          path: lighter-go

      - name: Cache libsigner (linux/arm64)
        id: cache_libsigner
        uses: actions/cache@v4
        with:
          path: lighter-go/build/libsigner.so
          key: ${{ runner.os }}-libsigner-${{ env.LIGHTER_GO_REF }}-${{ hashFiles('lighter-go/go.sum') }}

      - name: Build libsigner (linux/arm64)
        if: steps.cache_libsigner.outputs.cache-hit != 'true'
        run: |
          mkdir -p lighter-go/build
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}/lighter-go:/go/src/sdk" \
            -w /go/src/sdk \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            ${AL2023_IMAGE} \
            /bin/bash -lc "dnf -y install golang gcc && CGO_ENABLED=1 GOOS=linux GOARCH=arm64 go build -buildvcs=false -buildmode=c-shared -trimpath -o ./build/libsigner.so ./sharedlib && chown -R ${HOST_UID}:${HOST_GID} /go/src/sdk/build"

      - name: Save libsigner cache (linux/arm64)
        if: steps.cache_libsigner.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: lighter-go/build/libsigner.so
          key: ${{ runner.os }}-libsigner-${{ env.LIGHTER_GO_REF }}-${{ hashFiles('lighter-go/go.sum') }}

      - name: Cache cargo (linux/arm64)
        id: cache_cargo
        uses: actions/cache@v4
        with:
          path: |
            .cache/cargo/registry
            .cache/cargo/git
            .cache/cargo/bin
            .cache/rustup
            slow-mm/target
          key: ${{ runner.os }}-cargo-arm64-slow-mm-${{ hashFiles('slow-mm/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-arm64-slow-mm-

      - name: Build slow-mm (linux/arm64)
        id: build_slow_mm
        run: |
          mkdir -p .cache/cargo/registry .cache/cargo/git .cache/cargo/bin .cache/rustup slow-mm/target
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -e CARGO_HOME=/workspace/.cache/cargo \
            -e RUSTUP_HOME=/workspace/.cache/rustup \
            -e CARGO_INCREMENTAL=0 \
            -e LIGHTER_GO_PATH=/workspace/lighter-go/build \
            -e LD_LIBRARY_PATH=/workspace/lighter-go/build \
            ${AL2023_IMAGE} \
            /bin/bash -lc "set -euo pipefail; dnf -y install gcc gcc-c++ make openssl-devel pkgconf-pkg-config git curl-minimal tar gzip; if [ ! -x /workspace/.cache/cargo/bin/rustup ]; then curl -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable; fi; export PATH=/workspace/.cache/cargo/bin:\$PATH; rustc -V; cargo -V; cd slow-mm && cargo build --release --locked; chown -R ${HOST_UID}:${HOST_GID} /workspace/slow-mm/target /workspace/.cache/cargo /workspace/.cache/rustup"

      - name: Fix cargo cache permissions
        if: steps.build_slow_mm.outcome == 'success'
        run: |
          if command -v sudo >/dev/null 2>&1; then
            sudo chown -R "$(id -u):$(id -g)" .cache/cargo .cache/rustup slow-mm/target
            sudo chmod -R u+rwX,go+rX .cache/cargo .cache/rustup slow-mm/target
          else
            chown -R "$(id -u):$(id -g)" .cache/cargo .cache/rustup slow-mm/target
            chmod -R u+rwX,go+rX .cache/cargo .cache/rustup slow-mm/target
          fi

      - name: Save cargo cache (linux/arm64)
        if: steps.build_slow_mm.outcome == 'success' && steps.cache_cargo.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            .cache/cargo/registry
            .cache/cargo/git
            .cache/cargo/bin
            .cache/rustup
            slow-mm/target
          key: ${{ runner.os }}-cargo-arm64-slow-mm-${{ hashFiles('slow-mm/Cargo.lock') }}

      - name: Package artifacts
        run: |
          mkdir -p dist/bin dist/lib dist/scripts dist/configs
          cp slow-mm/target/release/slow-mm dist/bin/slow-mm
          cp lighter-go/build/libsigner.so dist/lib/libsigner.so
          rsync -a \
            --exclude "venv/" \
            --exclude "__pycache__/" \
            --exclude "*.log" \
            --exclude "*.pyc" \
            slow-mm/scripts/ dist/scripts/
          rsync -a slow-mm/configs/ dist/configs/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload artifacts to S3
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET || vars.S3_BUCKET }}
        run: |
          aws s3 cp dist/bin/slow-mm "s3://${S3_BUCKET}/slow-mm/slow-mm"
          aws s3 cp dist/lib/libsigner.so "s3://${S3_BUCKET}/slow-mm/libsigner.so"
          aws s3 sync dist/scripts/ "s3://${S3_BUCKET}/slow-mm/scripts/" \
            --exclude "venv/*" \
            --exclude "venv/**" \
            --exclude "__pycache__/*" \
            --exclude "__pycache__/**" \
            --exclude "*.log" \
            --exclude "*.pyc"
          aws s3 sync dist/configs/ "s3://${S3_BUCKET}/slow-mm/configs/"
          aws s3 cp slow-mm/deploy/slow-mm.service "s3://${S3_BUCKET}/deploy/slow-mm.service"

      - name: Deploy via SSM (no restart)
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET || vars.S3_BUCKET }}
          INSTANCE_ID: ${{ secrets.INSTANCE_ID || vars.INSTANCE_ID }}
        run: |
          cat > /tmp/ssm-params.json <<'JSON'
          {
            "commands": [
              "sudo mkdir -p __INSTALL_DIR__/bin __INSTALL_DIR__/lib __INSTALL_DIR__/scripts __INSTALL_DIR__/configs",
              "aws s3 cp s3://__S3_BUCKET__/slow-mm/slow-mm __INSTALL_DIR__/bin/slow-mm",
              "sudo chmod 755 __INSTALL_DIR__/bin/slow-mm",
              "aws s3 cp s3://__S3_BUCKET__/slow-mm/libsigner.so __INSTALL_DIR__/lib/libsigner.so",
              "sudo chmod 644 __INSTALL_DIR__/lib/libsigner.so",
              "aws s3 sync s3://__S3_BUCKET__/slow-mm/scripts __INSTALL_DIR__/scripts",
              "aws s3 sync s3://__S3_BUCKET__/slow-mm/configs __INSTALL_DIR__/configs",
              "sudo chmod 755 __INSTALL_DIR__/scripts/*.sh",
              "/bin/bash -lc 'set -e; UPDATED=0; for svc in slow-mm; do aws s3 cp s3://__S3_BUCKET__/deploy/$svc.service /tmp/$svc.service; if [ ! -f /etc/systemd/system/$svc.service ] || ! cmp -s /etc/systemd/system/$svc.service /tmp/$svc.service; then sudo mv /tmp/$svc.service /etc/systemd/system/$svc.service; UPDATED=1; else rm /tmp/$svc.service; fi; done; if [ $UPDATED -eq 1 ]; then sudo systemctl daemon-reload; fi'"
            ]
          }
          JSON
          sed -i "s|__INSTALL_DIR__|${INSTALL_DIR}|g; s|__S3_BUCKET__|${S3_BUCKET}|g" /tmp/ssm-params.json

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy slow-mm" \
            --parameters file:///tmp/ssm-params.json \
            --query "Command.CommandId" \
            --output text)

          set +e
          aws ssm wait command-executed --command-id "${COMMAND_ID}" --instance-id "${INSTANCE_ID}"
          WAIT_STATUS=$?
          aws ssm get-command-invocation --command-id "${COMMAND_ID}" --instance-id "${INSTANCE_ID}" --output text
          exit $WAIT_STATUS
